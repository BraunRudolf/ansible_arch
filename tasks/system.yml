---
- name: Enable ParallelDownloads
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?ParallelDownloads\s*='
    line: 'ParallelDownloads = 5'
    insertafter: '^#?\[options\]'

- name: Perform a full system update (pacman -Syu)
  community.general.pacman:
    update_cache: true
    upgrade: true

- name: Install System Foundations
  community.general.pacman:
    name:
      - base-devel
      - linux-zen
      - linux-zen-headers
      - linux-lts
      - linux-lts-headers
      - git
      - rust
      - snapper
      - snap-pac
      - ufw
      - iwd
      - bluez
      - bluez-utils
    state: present

- name: Install NVIDIA Graphics (Zen/DKMS)
  community.general.pacman:
    name:
      - nvidia-dkms
      - nvidia-utils
      - libva-nvidia-driver
      - nvidia-settings
    state: present

- name: Enable NVIDIA Early Modesetting in Limine
  ansible.builtin.replace:
    path: "{{ limine_conf_path }}"
    # Regex logic: Find lines starting with 'cmdline:' that DON'T have the flag yet
    regexp: '^(\s*cmdline: (?!.*nvidia_drm\.modeset=1).*)'
    replace: '\1 nvidia_drm.modeset=1'

- name: Ensure mkinitcpio drop-in directory exists
  ansible.builtin.file:
    path: /etc/mkinitcpio.conf.d
    state: directory
    mode: '0755'

- name: Configure Early KMS and filesystem modules via drop-in
  ansible.builtin.copy:
    dest: /etc/mkinitcpio.conf.d/nvidia_btrfs.conf
    content: |
      # Ansible managed: Early KMS for NVIDIA and BTRFS support
      MODULES=(btrfs nvidia nvidia_modeset nvidia_uvm nvidia_drm)
    mode: '0644'
  notify: Regenerate initramfs

- name: Configure NetworkManager to use iwd backend
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/wifi_backend.conf
    content: |
      [device]
      wifi.backend=iwd
    mode: '0644'

- name: Basic Firewall Setup (UFW)
  block:
    - name: Set default firewall policies
      community.general.ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: 'incoming', policy: 'deny' }
        - { direction: 'outgoing', policy: 'allow' }
    
    - name: Enable UFW
      community.general.ufw:
        state: enabled

- name: Enable and Start System Services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - NetworkManager
    - bluetooth
    - ufw

